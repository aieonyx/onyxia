<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' asset: https://asset.localhost http://localhost:1420; script-src 'self' http://localhost:1420 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ipc: http://ipc.localhost ws://localhost:1420;" />
  <title>Onyxia</title>
  <link rel="stylesheet" href="styles/chrome.css" />
</head>
<body>
  <div id="browser-chrome" data-tauri-drag-region>
    <div id="tab-strip" data-tauri-drag-region>
      <div id="tabs-container"></div>
      <button id="new-tab-btn" title="New Tab">+</button>
      <div id="window-controls">
        <button id="btn-minimize" title="Minimize">&#8211;</button>
        <button id="btn-maximize" title="Maximize">&#9633;</button>
        <button id="btn-close" title="Close">&#10005;</button>
      </div>
    </div>
    <div id="nav-bar">
      <button id="btn-back" title="Back">&#8592;</button>
      <button id="btn-forward" title="Forward">&#8594;</button>
      <button id="btn-reload" title="Reload">&#8635;</button>
      <div id="url-bar-wrap">
        <div id="protocol-switcher">
          <button id="protocol-btn" title="Switch protocol">
            <span id="protocol-icon"></span>
            <span id="protocol-chevron">&#9662;</span>
          </button>
          <div id="protocol-dropdown" class="hidden">
            <button class="protocol-option" data-protocol="https">
              <span class="proto-icon">&#128274;</span>
              <span class="proto-label">HTTPS</span>
              <span class="proto-check" id="https-check"></span>
            </button>
            <button class="protocol-option" data-protocol="awp">
              <span class="proto-icon">&#10022;</span>
              <span class="proto-label">AWP</span>
              <span class="proto-check" id="awp-check"></span>
            </button>
          </div>
        </div>
        <span id="trust-indicator" title="Connection trust"></span>
        <input id="url-input" type="text" spellcheck="false"
               placeholder="Enter address" autocomplete="off" />
      </div>
      <button id="vault-btn" title="Sovereign Vault">&#128274;</button>
      <button id="legacy-btn" title="Digital Legacy" class="legacy-inactive">&#9760;</button>
    </div>


    <!-- C10: Digital Legacy Panel -->
    <div id="legacy-panel" class="hidden">
      <div id="legacy-header">
        <span id="legacy-title">&#9760; Digital Legacy</span>
        <button id="legacy-close">&#10005;</button>
      </div>
      <div id="legacy-body">
        <div class="legacy-section">
          <label>Inactivity Trigger (days)</label>
          <input type="number" id="legacy-days" value="180" min="30" max="3650" />
        </div>
        <div class="legacy-section">
          <label>Legacy Holder Name</label>
          <input type="text" id="legacy-holder-name" placeholder="Full name" />
        </div>
        <div class="legacy-section">
          <label>Legacy Holder Contact</label>
          <input type="text" id="legacy-holder-contact" placeholder="Email or phone" />
        </div>
        <div class="legacy-section">
          <label>Critical Data (passwords, keys)</label>
          <select id="legacy-critical-action">
            <option value="delete">Delete immediately</option>
            <option value="preserve">Preserve for holder</option>
          </select>
        </div>
        <div class="legacy-section">
          <label>Personal Data (history, notes)</label>
          <select id="legacy-personal-action">
            <option value="transfer">Transfer to holder</option>
            <option value="delete">Delete</option>
          </select>
        </div>
        <div class="legacy-section">
          <label>Noise Data (cache, analytics)</label>
          <select id="legacy-noise-action">
            <option value="purge">Purge immediately</option>
            <option value="preserve">Preserve</option>
          </select>
        </div>
        <button id="legacy-save-btn">Save Testament</button>
        <div id="legacy-status-msg"></div>
      </div>
    </div>
    <!-- Vault Panel -->
    <div id="vault-panel" class="hidden">
      <div id="vault-header">
        <span id="vault-title">&#128274; Sovereign Vault</span>
        <button id="vault-close">&#10005;</button>
      </div>
      <div id="vault-status">
        <span id="vault-lock-status">Vault locked</span>
        <button id="vault-unlock-btn">Unlock</button>
      </div>
      <div id="vault-credentials" class="hidden">
        <div id="vault-list"></div>
      </div>
    </div>

    <!-- Save Credential Banner -->
    <div id="save-credential-banner" class="hidden">
      <span id="save-cred-msg">Save password for <strong id="save-cred-host"></strong>?</span>
      <button id="save-cred-yes">Save</button>
      <button id="save-cred-no">Never</button>
      <button id="save-cred-dismiss">&#10005;</button>
    </div>

    <div id="arpi-bar">
      <div id="arpi-legacy">
        <span class="arpi-legacy-icon">&#128274;</span>
        <span class="arpi-legacy-text">Legacy connection — ARPi not active</span>
      </div>
      <div id="arpi-sovereign" class="hidden">
        <span class="arpi-label">ARPi</span>
        <span class="arpi-layer" id="layer-schema">L1 Schema</span>
        <span class="arpi-layer" id="layer-identity">L2 Identity</span>
        <span class="arpi-layer" id="layer-auth">L3 Auth</span>
        <span class="arpi-layer" id="layer-scope">L4 Scope</span>
        <span class="arpi-layer" id="layer-anomaly">L5 Anomaly</span>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/main.ts"></script>
</body>
</html>
