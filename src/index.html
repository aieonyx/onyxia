<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' asset: https://asset.localhost http://localhost:1420; script-src 'self' http://localhost:1420 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ipc: http://ipc.localhost ws://localhost:1420;" />
  <title>Onyxia</title>
  <link rel="stylesheet" href="styles/chrome.css" />
</head>
<body>
  <div id="browser-chrome">
    <div id="tab-strip" data-tauri-drag-region>
      <div id="tabs-container"></div>
      <button id="new-tab-btn" title="New Tab">+</button>
      <div id="window-controls">
        <button id="btn-minimize" title="Minimize">&#8211;</button>
        <button id="btn-maximize" title="Maximize">&#9633;</button>
        <button id="btn-close" title="Close">&#10005;</button>
      </div>
    </div>
    <div id="nav-bar">
      <button id="btn-back" title="Back">&#8592;</button>
      <button id="btn-forward" title="Forward">&#8594;</button>
      <button id="btn-reload" title="Reload">&#8635;</button>
      <div id="url-bar-wrap">
        <div id="protocol-switcher">
          <button id="protocol-btn" title="Switch protocol">
            <span id="protocol-icon"></span>
            <span id="protocol-chevron">&#9662;</span>
          </button>
          <div id="protocol-dropdown" class="hidden">
            <button class="protocol-option" data-protocol="https">
              <span class="proto-icon">&#128274;</span>
              <span class="proto-label">HTTPS</span>
              <span class="proto-check" id="https-check"></span>
            </button>
            <button class="protocol-option" data-protocol="awp">
              <span class="proto-icon">&#10022;</span>
              <span class="proto-label">AWP</span>
              <span class="proto-check" id="awp-check"></span>
            </button>
          </div>
        </div>
        <input id="url-input" type="text" spellcheck="false"
               placeholder="Enter address" autocomplete="off" />
      </div>
    </div>
    <div id="arpi-bar">
      <div id="arpi-legacy">
        <span class="arpi-legacy-icon">&#128274;</span>
        <span class="arpi-legacy-text">Legacy connection — ARPi not active</span>
      </div>
      <div id="arpi-sovereign" class="hidden">
        <span class="arpi-label">ARPi</span>
        <span class="arpi-layer" id="layer-schema">L1 Schema</span>
        <span class="arpi-layer" id="layer-identity">L2 Identity</span>
        <span class="arpi-layer" id="layer-auth">L3 Auth</span>
        <span class="arpi-layer" id="layer-scope">L4 Scope</span>
        <span class="arpi-layer" id="layer-anomaly">L5 Anomaly</span>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/main.ts"></script>
</body>
</html>
